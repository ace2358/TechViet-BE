version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: techviet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tech-viet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-script.sql:/docker-entrypoint-initdb.d/01-db-script.sql:ro

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: techviet-api
    depends_on:
      - postgres
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=tech-viet;Username=postgres;Password=postgres
      Jwt__Issuer: techviet-be
      Jwt__Audience: techviet-client
      Jwt__Secret: change-this-in-production
      Jwt__ExpireMinutes: 120
    ports:
      - "53011:8080"

volumes:
  postgres_data:
